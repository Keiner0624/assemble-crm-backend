spring:
  application:
    name: assemble-crm

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/assemble_crm}
    username: ${DB_USERNAME:assemble}
    password: ${DB_PASSWORD:assemble}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Application-specific configuration
app:
  security:
    jwt:
      # Base64 secret. Override in production via APP_JWT_SECRET env var.
      secret: ${APP_JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJieXRlcyE=}
      access-token-expiration-ms: ${APP_JWT_ACCESS_EXP:900000}        # 15 minutes
      refresh-token-expiration-ms: ${APP_JWT_REFRESH_EXP:604800000}   # 7 days
      issuer: assemble-crm
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:4200}
  ratelimit:
    login:
      max-attempts: ${APP_LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${APP_LOGIN_WINDOW_SECONDS:300}
  seed:
    enabled: ${APP_SEED_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
    com.assemble.crm: DEBUG
