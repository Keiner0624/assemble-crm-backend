services:
  postgres:
    image: postgres:16-alpine
    container_name: assemble-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assemble_crm
      POSTGRES_USER: assemble
      POSTGRES_PASSWORD: assemble
    ports:
      - "5432:5432"
    volumes:
      - assemble_crm_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assemble -d assemble_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  assemble_crm_data:
